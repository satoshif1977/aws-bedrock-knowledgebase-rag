name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform 構文チェック
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
      - name: terraform fmt
        run: terraform fmt --check -recursive
      - name: terraform init
        run: terraform init -backend=false -input=false
      - name: terraform validate
        run: terraform validate

  test:
    name: Python ユニットテスト
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ap-northeast-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install deps
        run: pip install pytest boto3 botocore
      - name: pytest
        run: pytest lambda/test_query_handler.py -v

  security:
    name: Checkov セキュリティスキャン
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          # PoC 環境として意図的にスキップ（本番化時は個別に対応）
          skip_check: >-
            CKV_AWS_41,CKV_AWS_93,
            CKV_AWS_56,CKV_AWS_53,CKV_AWS_54,CKV_AWS_55,
            CKV_AWS_57,CKV_AWS_20,CKV_AWS_19,CKV_AWS_21,
            CKV2_AWS_6,CKV2_AWS_61,
            CKV_AWS_60,CKV_AWS_61,CKV_AWS_62,CKV_AWS_63,
            CKV_AWS_274,CKV_AWS_286,CKV_AWS_287,CKV_AWS_288,CKV_AWS_289,
            CKV2_AWS_40,CKV2_AWS_56,
            CKV_AWS_337,CKV2_AWS_34,
            CKV_AWS_66,CKV_AWS_363,CKV_AWS_45,CKV_AWS_50,
            CKV2_AWS_70,CKV_AWS_217,CKV_AWS_237,CKV_AWS_301,
            CKV_AWS_364,CKV2_AWS_75,CKV2_AWS_77,CKV2_AWS_29,
            CKV_AWS_59,CKV_AWS_76,CKV_AWS_73,CKV_AWS_120,
            CKV2_AWS_4,CKV2_AWS_51,CKV2_AWS_53,
            CKV_AWS_117,CKV_AWS_272,CKV_AWS_116,CKV_AWS_115,
            CKV_AWS_173,CKV_AWS_158,CKV_AWS_338
          output_format: cli
